# ==============================================================================
# Elements Core - Liquid Network (mainnet)
# ==============================================================================

chain=liquidv1

# ---- Mainchain (Bitcoin Core) ----
# Necessário para validar peg-ins e peg-outs
mainchainrpchost=bitcoind
mainchainrpcport=8332
validatepegin=1

# ---- Rede ----
server=1
listen=1
port=7042

# ---- Tor ----
proxy=tor:9050
torcontrol=tor:9051
bind=0.0.0.0

# ---- RPC ----
rpcbind=0.0.0.0
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16
rpcport=7041

# ---- Performance ----
dbcache=512
maxmempool=200
maxconnections=40
