services:

  # ──────────────────────────────────────────────
  # Tor - SOCKS5 proxy + hidden service automático
  # ──────────────────────────────────────────────
  tor:
    build: ./tor
    container_name: btc_tor
    restart: unless-stopped
    environment:
      - TOR_CONTROL_PASSWORD=${TOR_CONTROL_PASSWORD}
    volumes:
      - tor_data:/var/lib/tor
    networks:
      - btcnet
    healthcheck:
      # Aguarda o SOCKS proxy do Tor estar pronto na porta 9050
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9050' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ──────────────────────────────────────────────
  # Bitcoin Core - nó completo com Tor habilitado
  # ──────────────────────────────────────────────
  bitcoind:
    build:
      context: ./bitcoin
      args:
        BITCOIN_VERSION: ${BITCOIN_VERSION:-28.1}
    container_name: btc_node
    restart: unless-stopped
    depends_on:
      tor:
        condition: service_healthy
    volumes:
      - ${BITCOIN_DATA}:/data
      - ./bitcoin/bitcoin.conf:/data/bitcoin.conf:ro
    ports:
      # RPC — apenas localhost (não expõe na rede)
      - "127.0.0.1:8332:8332"
      # P2P — exposto para receber conexões clearnet de entrada
      - "8333:8333"
    networks:
      - btcnet
    command: >
      bitcoind
        -datadir=/data
        -pid=/data/bitcoind.pid
        -rpcuser=${BITCOIN_RPC_USER}
        -rpcpassword=${BITCOIN_RPC_PASSWORD}
        -torpassword=${TOR_CONTROL_PASSWORD}

  # ──────────────────────────────────────────────
  # Fulcrum - Electrum Server (índice Bitcoin)
  # ──────────────────────────────────────────────
  fulcrum:
    build:
      context: ./fulcrum
      args:
        FULCRUM_VERSION: ${FULCRUM_VERSION:-2.1.0}
    container_name: fulcrum
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_started
    environment:
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    volumes:
      - ${FULCRUM_DATA}:/data
      - ./fulcrum/fulcrum.conf.template:/fulcrum.conf.template:ro
    ports:
      # Electrum TCP — para carteiras na rede local
      - "127.0.0.1:50001:50001"
    networks:
      - btcnet

  # ──────────────────────────────────────────────
  # Canary - Monitor de wallets Bitcoin
  # ──────────────────────────────────────────────
  canary-backend:
    build:
      context: ./canary
      dockerfile: Dockerfile.backend
    container_name: canary_backend
    restart: unless-stopped
    depends_on:
      fulcrum:
        condition: service_started
    environment:
      - CANARY_MODE=self-hosted
      - CANARY_NETWORK=mainnet
      - CANARY_ELECTRUM_URL=tcp://fulcrum:50001
      - CANARY_DATA_DIR=/data
      - CANARY_BIND_ADDRESS=0.0.0.0:8000
    volumes:
      - ${CANARY_DATA}:/data
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - btcnet

  canary-frontend:
    build:
      context: ./canary
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
    container_name: canary_frontend
    restart: unless-stopped
    depends_on:
      canary-backend:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - btcnet

  # ──────────────────────────────────────────────
  # electrs-liquid - Electrum Server para Liquid
  # ──────────────────────────────────────────────
  electrs-liquid:
    build:
      context: ./electrs-liquid
    container_name: electrs_liquid
    restart: unless-stopped
    depends_on:
      elementsd:
        condition: service_started
    volumes:
      - ${FULCRUM_LIQUID_DATA}:/data
    ports:
      # Electrum TCP para Liquid — para carteiras na rede local
      - "127.0.0.1:60001:60001"
    networks:
      - btcnet
    command: >
      electrs
        --network liquid
        --daemon-rpc-addr elementsd:7041
        --cookie ${ELEMENTS_RPC_USER}:${ELEMENTS_RPC_PASSWORD}
        --electrum-rpc-addr 0.0.0.0:60001
        --db-dir /data
        -v

  # ──────────────────────────────────────────────
  # Elements Core - Liquid Network (sidechain)
  # ──────────────────────────────────────────────
  elementsd:
    build:
      context: ./elements
      args:
        ELEMENTS_VERSION: ${ELEMENTS_VERSION:-23.3.2}
    container_name: elements_node
    restart: unless-stopped
    depends_on:
      tor:
        condition: service_healthy
      bitcoind:
        condition: service_started
    volumes:
      - ${ELEMENTS_DATA}:/data
      - ./elements/elements.conf:/data/elements.conf:ro
    ports:
      # RPC — apenas localhost
      - "127.0.0.1:7041:7041"
      # P2P — exposto para conexões de entrada
      - "7042:7042"
    networks:
      - btcnet
    command: >
      elementsd
        -datadir=/data
        -mainchainrpcuser=${BITCOIN_RPC_USER}
        -mainchainrpcpassword=${BITCOIN_RPC_PASSWORD}
        -rpcuser=${ELEMENTS_RPC_USER}
        -rpcpassword=${ELEMENTS_RPC_PASSWORD}

networks:
  btcnet:
    driver: bridge

volumes:
  tor_data:
    driver: local
