# ==============================================================================
# Bitcoin Core - Configuração com Tor
# ==============================================================================

# ---- Rede ----
server=1
listen=1
port=8333

# ---- Tor ----
# Roteie todas as conexões de saída pelo Tor (SOCKS5)
proxy=tor:9050

# Permite que o Bitcoin Core crie automaticamente um hidden service v3 (.onion)
# via Tor control port. O endereço .onion persistirá em /data/onion_v3_private_key
torcontrol=tor:9051

# Bind para aceitar conexões P2P (clearnet + onion via hidden service)
bind=0.0.0.0

# Para modo somente-Tor (mais privado, sem clearnet): descomente abaixo
# Com onlynet=onion, o nó aceita/inicia conexões APENAS via .onion
#onlynet=onion

# ---- RPC ----
rpcbind=0.0.0.0
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16
rpcport=8332

# ---- Performance ----
dbcache=1024
maxmempool=300
maxconnections=40

# ---- Nós de confiança ----
# addnode=seunodo.onion:8333

# ---- Índices opcionais ----
txindex=1
# coinstatsindex=1
